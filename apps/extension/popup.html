<!doctype html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="/popup.css"><title>Verity</title></head><body><main class="popup-shell">
  <header class="popup-header"><span class="popup-mark" aria-hidden="true">V</span><div><h1>Verity</h1><p id="status" role="status" aria-live="polite">Ready to listen</p></div></header>
  <section class="capture-actions" aria-label="Capture controls"><button id="live">Start live listening</button><button class="secondary" id="fixture">Run demo</button><button class="quiet" id="stop">Stop</button></section>
  <details class="provider-settings"><summary>Model provider <span>BYOK</span></summary><div class="settings-body">
    <label>Provider<select id="provider"><option value="digitalocean">DigitalOcean</option><option value="openai">OpenAI</option></select></label>
    <label>API key<input id="api-key" type="password" autocomplete="new-password" spellcheck="false"></label>
    <label>Fast model<input id="fast-model" autocomplete="off"></label>
    <label>Reasoning model<input id="reasoning-model" autocomplete="off"></label>
    <label>Monthly spend guard<input id="budget" type="number" min="0.10" step="0.10" value="10"></label>
    <div class="settings-actions"><button class="secondary" id="test-provider">Test</button><button id="save-provider">Save locally</button></div>
    <button class="quiet danger" id="delete-provider">Delete saved key</button><p id="provider-status" role="status" aria-live="polite"></p>
    <small>Your key stays in extension storage and is sent only to your selected provider.</small>
  </div></details>
</main><script type="module" src="/src/popup.ts"></script></body></html>
