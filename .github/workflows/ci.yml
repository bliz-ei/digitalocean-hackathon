name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verity
          POSTGRES_PASSWORD: verity
          POSTGRES_DB: verity
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U verity -d verity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      VERITY_DATABASE_URL: postgresql://verity:verity@localhost:54329/verity
      TEST_DATABASE_URL: postgresql://verity:verity@localhost:54329/verity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install -e ".[test]"
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm run contracts:check
      - run: .venv/bin/python scripts/migrate.py
      - run: npm run phase0:test-node
      - run: npm run phase0:validate
      - run: .venv/bin/python -m pytest -q
      - run: npm audit --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
