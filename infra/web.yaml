name: verity-web
region: sfo
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
static_sites:
  - name: web
    github:
      repo: bliz-ei/digitalocean-hackathon
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci && npm run build:extension-zip && npm run build -w @verity/web
    output_dir: apps/web/dist
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        value: "__VERITY_APP_URL__"
        scope: BUILD_TIME
      - key: VITE_PWA_URL
        value: "__VERITY_APP_URL__"
        scope: BUILD_TIME
