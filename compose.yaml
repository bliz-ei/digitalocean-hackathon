services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: verity
      POSTGRES_USER: verity
      POSTGRES_PASSWORD: verity
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verity -d verity"]
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
